name: CI вЂ“ Trivy Scan & Terraform Plan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # allows posting plan comments on PRs

env:
  AWS_REGION: eu-central-1
  TF_VERSION: "1.9.8"
  AWS_DEPLOY_ROLE_ARN: "arn:aws:iam::308488463057:role/GitHubActionsRole-platform-level"

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 1 вЂ“ Trivy IaC / config scan
  # Fails the pipeline on any CRITICAL finding.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  trivy-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: "."
          # Fail only on CRITICAL severity findings
          severity: CRITICAL
          exit-code: "1"
          format: table
          # Scan all IaC-relevant files in the repo
          skip-dirs: ".terraform,.git"

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 2a вЂ“ Terraform plan (Wave 1: iam + load_balancer)
  # Must run before eks, which depends on their outputs.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-plan-wave1:
    name: Terraform Plan вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: trivy-scan

    strategy:
      fail-fast: false
      matrix:
        module:
          - iam
          - load_balancer

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform validate

      - name: Terraform Plan вЂ“ ${{ matrix.module }}
        id: tf-plan
        working-directory: ${{ matrix.module }}
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan.binary 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MODULE: ${{ matrix.module }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`${process.env.MODULE}/plan.txt`, 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `## Terraform Plan вЂ“ \`${process.env.MODULE}\`\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}/tfplan.binary
          retention-days: 7

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 2b вЂ“ Terraform plan (Wave 2: eks preliminary)
  # Passes empty strings so plan succeeds during initial scan / PR checks.
  # True plan with resolved SSM variables runs post-Wave 1 apply on push to main.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-plan-eks:
    name: Terraform Plan вЂ“ eks
    runs-on: ubuntu-latest
    needs: trivy-scan   # plan-only: no runtime dependency on wave1 outputs

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ eks
        working-directory: eks
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate вЂ“ eks
        working-directory: eks
        run: terraform validate

      - name: Terraform Plan вЂ“ eks
        id: tf-plan
        working-directory: eks
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -var="alb_sg_id="\
            -var="eks_admins_arn=" \
            -out=tfplan.binary 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('eks/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `## Terraform Plan вЂ“ \`eks\`\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact вЂ“ eks
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-eks-${{ github.run_id }}
          path: eks/tfplan.binary
          retention-days: 7

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 2c вЂ“ Terraform plan (Wave 3: remaining modules)
  # Independent of other modules; run in parallel.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-plan-wave3:
    name: Terraform Plan вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: trivy-scan

    strategy:
      fail-fast: false
      matrix:
        module:
          - compute
          - databases
          - logging
          - monitoring

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform validate

      - name: Terraform Plan вЂ“ ${{ matrix.module }}
        id: tf-plan
        working-directory: ${{ matrix.module }}
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan.binary 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MODULE: ${{ matrix.module }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`${process.env.MODULE}/plan.txt`, 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `## Terraform Plan вЂ“ \`${process.env.MODULE}\`\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}/tfplan.binary
          retention-days: 7

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 3a вЂ“ Terraform apply (Wave 1: iam + load_balancer)
  # Runs first; eks depends on their SSM outputs.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-apply-wave1:
    name: Terraform Apply вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: terraform-plan-wave1
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: true    # eks must not start if wave1 fails
      matrix:
        module:
          - iam
          - load_balancer

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Download plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}

      - name: Terraform Apply вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform apply -input=false -auto-approve tfplan.binary

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 3b вЂ“ Terraform plan (Wave 2: eks with resolved vars)
  # Runs after Wave 1 apply on push to main. Reads resolved
  # alb_sg_id and eks_admins_arn from SSM after iam + load_balancer apply.
  # Produces tfplan.binary and plan summary for review before manual apply.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-plan-eks-resolved:
    name: Terraform Plan вЂ“ eks (Resolved Vars)
    runs-on: ubuntu-latest
    needs: terraform-apply-wave1
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Read cross-module SSM outputs
        id: ssm
        run: |
          echo "alb_sg_id=$(aws ssm get-parameter --name /platform/alb/security_group_id --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "eks_admins_arn=$(aws ssm get-parameter --name /platform/iam/eks_admins_arn --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform Init вЂ“ eks
        working-directory: eks
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan вЂ“ eks (with resolved vars)
        id: tf-plan
        working-directory: eks
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -var="alb_sg_id=${{ steps.ssm.outputs.alb_sg_id }}" \
            -var="eks_admins_arn=${{ steps.ssm.outputs.eks_admins_arn }}" \
            -out=tfplan.binary 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write plan summary to step summary
        run: |
          echo "## Terraform Plan вЂ“ \`eks\` (Resolved Vars)" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          head -c 60000 eks/plan.txt >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact вЂ“ eks (resolved)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-eks-resolved-${{ github.run_id }}
          path: |
            eks/tfplan.binary
            eks/plan.txt
          retention-days: 2

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 3c вЂ“ Terraform apply (Wave 2: eks)
  # Requires manual review/approval in the production environment
  # after reviewing the plan produced by terraform-plan-eks-resolved.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-apply-eks:
    name: Terraform Apply вЂ“ eks
    runs-on: ubuntu-latest
    needs: terraform-plan-eks-resolved
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ eks
        working-directory: eks
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Download plan artifact вЂ“ eks
        uses: actions/download-artifact@v4
        with:
          name: tfplan-eks-resolved-${{ github.run_id }}
          path: eks

      - name: Terraform Apply вЂ“ eks
        working-directory: eks
        run: terraform apply -input=false -auto-approve tfplan.binary

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 3d вЂ“ Terraform apply (Wave 3: remaining modules)
  # Independent; run in parallel after plan passes.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-apply-wave3:
    name: Terraform Apply вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: terraform-plan-wave3
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        module:
          - compute
          - databases
          - logging
          - monitoring

    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          terraform init -input=false \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Download plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}

      - name: Terraform Apply вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform apply -input=false -auto-approve tfplan.binary
